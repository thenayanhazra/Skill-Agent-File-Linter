[rule]
id          = "AGT020"
severity    = "critical"
description = "Instruction override attempt detected"
help        = "Remove or rephrase text that attempts to override the agent's system instructions."

[[patterns]]
type             = "aho_corasick"
case_insensitive = true
keywords = [
    "ignore previous instructions",
    "ignore all previous instructions",
    "ignore prior instructions",
    "ignore all prior instructions",
    "ignore above instructions",
    "ignore all above instructions",
    "ignore your instructions",
    "ignore your previous instructions",
    "disregard previous instructions",
    "disregard all previous instructions",
    "disregard prior instructions",
    "disregard your instructions",
    "forget previous instructions",
    "forget your instructions",
    "forget all previous instructions",
    "override your instructions",
    "override previous instructions",
    "override all instructions",
    "overwrite your instructions",
    "discard your instructions",
    "discard previous instructions",
    "new instructions:",
    "new system prompt:",
    "updated instructions:",
    "your new instructions are",
    "your real instructions",
    "your actual instructions",
    "from now on ignore",
    "from this point ignore",
    "from now on disregard",
    "stop following your instructions",
    "do not follow your instructions",
    "do not follow previous instructions",
]
